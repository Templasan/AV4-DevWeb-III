spring.application.name=autobots
server.port=8080

# ==========================================================
# 1. ESCOLHA O SEU BANCO DE DADOS (Comente um e desmarque o outro)
# ==========================================================

# --- OPÇÃO A: BANCO MYSQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/NOME_DO_SEU_BANCO?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=fatec
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=create

