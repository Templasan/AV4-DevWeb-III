name: Java CI com MySQL

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest 

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: fatec # Senha mestre do container
          MYSQL_DATABASE: autobots
          MYSQL_ROOT_HOST: '%'       # Permite que o Spring conecte no root
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build e Testes com Maven
      working-directory: ./automanager
      run: mvn -B package -DskipTests
      env:
        SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/autobots?useSSL=false&allowPublicKeyRetrieval=true
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: fatec 